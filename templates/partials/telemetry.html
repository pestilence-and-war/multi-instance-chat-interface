<div id="telemetry-dashboard" class="flex flex-col h-[calc(100vh-200px)] p-4 bg-gray-900 text-green-400 font-mono rounded-lg shadow-2xl border border-gray-700">
    <div class="flex justify-between items-center mb-4 border-b border-gray-700 pb-2">
        <h2 class="text-xl font-bold">📡 Global Office Telemetry</h2>
        <div class="flex space-x-4">
            <span id="telemetry-status" class="text-sm text-yellow-500 animate-pulse">● Connecting...</span>
            <button onclick="clearTelemetry()" class="text-xs bg-gray-800 hover:bg-gray-700 px-2 py-1 rounded border border-gray-600">Clear Log</button>
        </div>
    </div>

    <div class="flex flex-1 overflow-hidden space-x-4">
        <!-- System Log (Events) -->
        <div class="w-1/3 flex flex-col border-r border-gray-700 pr-4">
            <h3 class="text-xs uppercase text-gray-500 mb-2">System Events</h3>
            <div id="telemetry-log" class="flex-1 overflow-y-auto text-xs space-y-1 scrollbar-thin scrollbar-thumb-gray-700">
                <!-- Events appended here -->
            </div>
        </div>

        <!-- Live Feed (Text Streaming) -->
        <div class="w-2/3 flex flex-col">
            <h3 class="text-xs uppercase text-gray-500 mb-2">Live Agent Stream</h3>
            <div id="telemetry-stream-feed" class="flex-1 overflow-y-auto p-2 bg-black rounded border border-gray-800 text-sm whitespace-pre-wrap scrollbar-thin scrollbar-thumb-gray-700">
                <!-- Live text chunks here -->
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        const log = document.getElementById('telemetry-log');
        const feed = document.getElementById('telemetry-stream-feed');
        const status = document.getElementById('telemetry-status');
        let eventSource = null;

        function connect() {
            // No persistent connection needed for polling
            status.innerText = "● Polling Active";
            status.classList.remove('text-yellow-500');
            status.classList.add('text-green-500');
            
            // Poll immediately and then every 2 seconds
            pollTelemetry();
            window.telemetryInterval = setInterval(pollTelemetry, 2000);
        }

        async function pollTelemetry() {
            try {
                const response = await fetch('/telemetry/poll');
                const data = await response.json();
                if (data.status === 'success') {
                    // Process all events in the buffer
                    // To prevent duplication, we could track processed event IDs, 
                    // but for a simple log, clear and redraw or append new is fine.
                    // For now, let's clear and redraw to keep it simple and consistent.
                    renderAllEvents(data.events);
                }
            } catch (err) {
                console.error("Telemetry poll failed:", err);
            }
        }

        function renderAllEvents(events) {
            // To prevent screen flicker, only append if new events exist
            // This is a simple implementation
            log.innerHTML = '';
            feed.innerHTML = '';
            events.forEach(handleTelemetryEvent);
        }

        function handleTelemetryEvent(data) {
            const { agent, type, content, timestamp } = data;
            
            // 1. Log System Event
            if (type !== 'chunk' && type !== 'thinking') {
                const entry = document.createElement('div');
                entry.className = "hover:bg-gray-800 p-1 rounded";
                
                let color = "text-blue-400";
                if (type === 'error') color = "text-red-500";
                if (type === 'tool_result') color = "text-purple-400";
                if (type === 'finish') color = "text-white font-bold";

                entry.innerHTML = `<span class="text-gray-600">[${timestamp}]</span> <span class="font-bold">${agent}:</span> <span class="${color}">${type.toUpperCase()}</span>`;
                
                if (type === 'status' || type === 'error') {
                    entry.innerHTML += `<div class="text-gray-400 pl-4">${content}</div>`;
                }
                
                log.appendChild(entry);
                log.scrollTop = log.scrollHeight;
            }

            // 2. Feed Live Stream
            if (type === 'chunk' || type === 'thinking') {
                const prefix = type === 'thinking' ? '[THOUGHT] ' : '';
                const color = type === 'thinking' ? 'text-gray-500 italic' : 'text-green-400';
                
                // If it's a new agent or type, maybe add a marker
                // For simplicity, just append
                const span = document.createElement('span');
                span.className = color;
                span.innerText = content;
                feed.appendChild(span);
                
                // Auto-scroll if near bottom
                if (feed.scrollHeight - feed.scrollTop - feed.clientHeight < 100) {
                    feed.scrollTop = feed.scrollHeight;
                }
            }
            
            if (type === 'finish' || type === 'error') {
                feed.innerHTML += `\n\n--- TURN END [${agent}] ---\n\n`;
                feed.scrollTop = feed.scrollHeight;
            }
        }

        window.clearTelemetry = () => {
            log.innerHTML = '';
            feed.innerHTML = '';
        };

        // Connect on load
        connect();

        // Cleanup on remove
        document.body.addEventListener('htmx:beforeCleanupElement', (evt) => {
            if (evt.detail.target.id === 'telemetry-dashboard') {
                if (window.telemetryInterval) clearInterval(window.telemetryInterval);
            }
        });
    })();
</script>
